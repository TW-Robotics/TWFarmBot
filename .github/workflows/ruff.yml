name: Ruff

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install uv
      uses: astral-sh/setup-uv@v5
    - name: Install dependencies
      run: uv sync --all-packages
    - name: Check formatting
      run: uv run ruff format --check apps/ services/ libs/ core/ tests/
    - name: Check lint
      run: uv run ruff check apps/ services/ libs/ core/ tests/
