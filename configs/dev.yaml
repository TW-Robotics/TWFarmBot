env: dev
log_level: INFO

# LLM planner configuration. Read by planning_service.load_config().
# Resolution: PLANNING_LLM_* env var → this block → built-in default.
# Secrets (api_key) are NEVER stored here — set PLANNING_LLM_API_KEY in
# the environment, or reference a different env var via api_key_env.
planning:
  base_url: https://openrouter.ai/api/v1   # OpenAI-compatible endpoint
  model: deepseek/deepseek-v4-flash      # any model the endpoint exposes
  api_key_env: PLANNING_LLM_API_KEY  # name of the env var that holds the secret
  timeout_s: 120                       # raise this for slower models
  temperature: 0.0

# FarmBot WiFi credentials are read from environment variables
# (FARMBOT_HOST, FARMBOT_EMAIL, FARMBOT_PASSWORD, optional FARMBOT_TOKEN)
# by services/farmbot_gateway. Host defaults to the cloud broker
# "farmbot.farm.bot" — use "http://192.168.1.50" (or similar) for LAN.

# Safety limits enforced before any real-world action runs.
# Overridable via env: FARMBOT_MAX_WATER_SECONDS.
safety:
  max_water_seconds: 300
  # Move axis bounds (mm). Anything outside is rejected by safety.
  max_axis_mm:
    x: 1900
    y: 700
    z: 500

# Single pump configuration. The water action turns this pin on for N seconds.
watering:
  pump_pin: 7

# Named pins for the UI: label → {pin, mode, kind, group}.
#   kind: "valve" | "servo" | "sensor" | "io"
#   group: shown as a column header in the pin grid
# Every pin number must be unique; a single GPIO can't drive a valve and
# read a sensor at the same time.
pins:
- {label: "Pump", pin: 7, mode: digital, kind: valve, group: "Water"}
- {label: "Water solenoid", pin: 8, mode: digital, kind: valve, group: "Water"}
- {label: "Tool servo", pin: 10, mode: digital, kind: servo, group: "Tools"}
- {label: "Soil sensor", pin: 14, mode: analog, kind: sensor, group: "Sensors"}
- {label: "Light sensor", pin: 15, mode: analog, kind: sensor, group: "Sensors"}

# Preset gantry positions for the UI Move widget. Coordinates in mm.
positions:
- {label: "Home", x: 0, y: 0, z: 0}
- {label: "Bed", x: 100, y: 200, z: 0}
- {label: "Camera top", x: 0, y: 0, z: 400}

# Persistent garden coordinate model. The UI renders the origin at the
# bottom-left; X grows to the right and Y grows up the bed. Store coordinates
# using that same frame.
spatial:
  bounds: {x: 0, y: 0, width: 1900, height: 700}
  camera_offset: {x: 0, y: 0, z: 400}
  camera: {yaw_deg: 0, pitch_deg: 90, roll_deg: 0}

  zones:
  - id: tomato
    kind: tomato
    name: "Tomato Zone"
    x: 1100
    y: 100
    width: 800
    height: 300
    metadata: {soil_type: loam}

  - id: herbs
    kind: herbs
    name: "Herbs Zone"
    x: 100
    y: 100
    width: 1000
    height: 300
    metadata: {soil_type: sandy}

